databaseChangeLog:
  - changeSet:
      id: 1
      author: Mamedli Nuran
      changes:
        - createTable:
            tableName: employees
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_employees
                    nullable: false

              - column:
                  name: first_name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(150)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_employees_email

              - column:
                  name: position
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: hire_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_employees_email
            tableName: employees
            columns:
              - column:
                  name: email