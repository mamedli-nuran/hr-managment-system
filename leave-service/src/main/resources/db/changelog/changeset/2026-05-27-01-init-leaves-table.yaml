databaseChangeLog:
  - changeSet:
      id: 1
      author: Mamedli Nuran

      changes:
        - createTable:
            tableName: leaves
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_leaves
                    nullable: false

              - column:
                  name: employee_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: leave_type
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: end_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: reason
                  type: varchar(500)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE leaves
              ADD CONSTRAINT chk_leaves_status
              CHECK (status IN ('PENDING', 'APPROVED', 'REJECTED'));

        - sql:
            sql: >
              ALTER TABLE leaves
              ADD CONSTRAINT chk_leaves_dates
              CHECK (end_date >= start_date);

        - createIndex:
            indexName: idx_leaves_employee_id
            tableName: leaves
            columns:
              - column:
                  name: employee_id

        - createIndex:
            indexName: idx_leaves_created_at
            tableName: leaves
            columns:
              - column:
                  name: created_at