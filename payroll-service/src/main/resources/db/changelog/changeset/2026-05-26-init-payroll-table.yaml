databaseChangeLog:
  - changeSet:
      id: 1
      author: Mamedli Nuran

      changes:
        - createTable:
            tableName: payroll
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_payroll_id
                    nullable: false

              - column:
                  name: employee_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: base_salary
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: bonus
                  type: numeric(12,2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false

              - column:
                  name: pay_date
                  type: date
                  constraints:
                    nullable: false


      rollback:
        - dropTable:
            tableName: payroll